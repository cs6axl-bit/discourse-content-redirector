plugins:

  content_redirector_enabled:
    default: false
    client: false

  # Redirect mode
  # http  = direct HTTP redirect
  # meta  = HTML page with META refresh
  content_redirector_redirect_mode:
    default: "http"
    client: false

  # HTTP status used for server redirects
  content_redirector_http_status:
    default: 302
    client: false

  # -----------------------
  # External logging
  # -----------------------

  content_redirector_external_log_enabled:
    default: false
    client: false

  content_redirector_external_log_endpoint:
    default: ""
    client: false

  content_redirector_external_log_timeout_ms:
    default: 1500
    client: false

  # -----------------------
  # META redirect behavior
  # -----------------------

  # If enabled:
  # /content?u=... will META refresh to
  # /content?u=...&doredir=1
  # and that second request performs the HTTP redirect
  content_redirector_meta_second_hop_enabled:
    default: false
    client: false

  # Show manual "click here to continue" link
  # on the META redirect page
  content_redirector_meta_show_manual_link:
    default: true
    client: false
